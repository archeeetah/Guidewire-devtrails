version: '3.8'

services:
  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/shramshield
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - AUTO_SCAN_ENABLED=true
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shramshield-network

  # Frontend Next.js Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - shramshield-network

  # PostgreSQL Database (Simulating AWS RDS locally)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=shramshield
    ports:
      - "5433:5432" # Mapping to 5433 to avoid conflict with local postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shramshield-network

networks:
  shramshield-network:
    driver: bridge

volumes:
  postgres_data:
